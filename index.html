<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Zhili He - Researcher in Distributed Systems, Blockchain, and AI
    </title>
    <meta
      name="description"
      content="Zhili He - Personal website of a researcher specializing in distributed systems, blockchain technology, and artificial intelligence."
    />
    <meta name="author" content="Zhili He" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://shr1mptop.github.io/" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="stage"></div>

    <div class="top-bar">
      <span class="hint"
        >Drag the orbs · Click to pause · Text reflows at 60fps · Zero DOM
        reads</span
      >
      <span class="lang-switch">
        <a href="#" class="lang-btn" data-lang="zh">中文</a>
        <span class="lang-sep">|</span>
        <a href="#" class="lang-btn" data-lang="en">EN</a>
      </span>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <span class="stat-label">Lines</span
        ><span class="stat-value" id="sLines">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Reflow</span
        ><span class="stat-value" id="sReflow">0ms</span>
      </div>
      <div class="stat">
        <span class="stat-label">DOM reads</span
        ><span class="stat-value" id="sDom">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">FPS</span
        ><span class="stat-value" id="sFps">60</span>
      </div>
      <div class="stat">
        <span class="stat-label">Columns</span
        ><span class="stat-value" id="sCols">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Lang</span
        ><span class="stat-value" id="sLang">ZH</span>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
